<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wedding Invitation</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Allura&display=swap"
        rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/opening-screen.css">
    <link rel="stylesheet" href="css/envelope.css">
    <!-- <link rel="stylesheet" href="css/opening-text.css"> -->
    <link rel="stylesheet" href="css/invitation-content.css">
</head>

<body>

    <!-- =========================
         OPENING SCREEN
    ========================== -->

    <section id="opening-screen" class="opening-screen">

        <!-- Background Invitation -->

        <div class="opening-background-container">

            <img
                src="assets/images/invitationn.png"
                alt="Wedding Invitation Background"
                class="opening-background-image">

            <!-- Text Overlay -->

            <p class="opening-subtitle">
                YOU ARE INVITED TO<br>
                THE WEDDING OF
            </p>

            <h1 class="bride-title">
                Fathima Fidha
            </h1>

            <h1 class="groom-title">
                Mujahidh
            </h1>

            <p class="wedding-date">
                26.07.2026
            </p>

        </div>

        <!-- Envelope Animation -->

        <div class="envelope">

            <div class="flap flap-top"></div>
            <div class="flap flap-bottom"></div>
            <div class="flap flap-left"></div>
            <div class="flap flap-right"></div>

            <img
                src="assets/images/envelope-seal.png"
                alt="Envelope Seal"
                class="envelope-seal">

        </div>

        <!-- Tap Text -->

        <div class="tap-text">
            Tap Anywhere To Opens
        </div>

    </section>

    <!-- =========================
         INVITATION CONTENT
    ========================== -->

    <section id="invitation-content" class="invitation-section">

        <div class="invitation-wrapper">

            <img
                src="assets/images/invitation-content.png"
                alt="Wedding Invitation Content"
                class="invitation-content-image">

        </div>

    </section>

    <!-- Scripts -->

    <script src="js/opening.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
