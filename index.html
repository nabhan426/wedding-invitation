<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/opening.css">
    <link rel="stylesheet" href="css/invitation.css">
</head>
<body>

<section id="opening" class="opening-screen">

    <!-- Invitation Behind -->
    <div class="invitation-container">
        <img
            src="assets/images/invitationn.png"
            alt="Invitation"
            class="invitation-image"
        >
    </div>

    <!-- Envelope -->
    <div class="envelope">

        <div class="flap flap-top"></div>
        <div class="flap flap-bottom"></div>
        <div class="flap flap-left"></div>
        <div class="flap flap-right"></div>

        <img
            src="assets/images/seal.png"
            alt="Seal"
            class="seal"
            id="seal"
        >
    </div>

    <div class="tap-text">
        Tap Anywhere To Open
    </div>

</section>
<section id="invitation" class="invitation-section">

    <div class="invitation-card">

        <!-- Your text goes here later -->

        

        <div class="invitation-content">

        </div>

    </div>

</section>

<script src="js/opening.js"></script>
<script src="js/main.js"></script>
</body>
</html>
